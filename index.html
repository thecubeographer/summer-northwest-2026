  <script>
    /* edit mode (?edit) loads the editor; otherwise the normal read-only site */
    (function () {
      var local = /^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname);
      var edit = local && new URLSearchParams(location.search).has("edit");  // editing is local-only
      var s = document.createElement("script");
      s.src = edit ? "editor.js?v=3" : "app.js?v=17";
      document.body.appendChild(s);
    })();
